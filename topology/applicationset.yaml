apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pr-labs
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=default"]
  generators:
    # Check Repo settings here
    - pullRequest:
        github:
          owner: SirHoppington
          repo: net_gitops
          tokenRef:
            secretName: pull-request-git
            key: token
        requeueAfterSeconds: 30
  template:
    metadata:
      name: "lab-pr-{{ .number }}"
      annotations:
        # Post the lab's health back to the PR's head commit as a GitHub status.
        notifications.argoproj.io/subscribe.on-deployed.github: ""
        notifications.argoproj.io/subscribe.on-health-degraded.github: ""
        notifications.argoproj.io/subscribe.on-sync-failed.github: ""
    spec:
      project: default
      source:
        # net_gitops is the code store: each PR's lab + startup-configs + tests
        # are deployed from that PR's head commit, so the lab reflects the PR.
        repoURL: https://github.com/SirHoppington/net_gitops.git
        targetRevision: "{{ .head_sha }}"
        # topology/base is a kustomize dir (configMapGenerator builds the
        # startup-config maps from configs/<hostname>.cfg).
        path: topology/base
        kustomize:
          # Stamp the per-PR namespace onto every resource AND the managed
          # Namespace object, so prune on PR-close deletes the whole namespace.
          namespace: "lab-pr-{{ .number }}"
      destination:
        namespace: "lab-pr-{{ .number }}"
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          # server-side apply added
          - ServerSideApply=true
          - preserveResourcesOnDeletion=false
          # - SkipDryRunOnMissingResource=true


      ignoreDifferences:
          - group: ""
            kind: Namespace
            jsonPointers:
            - /metadata/labels