apiVersion: v1
kind: ConfigMap
metadata:
  name: exec-map
  # namespace: c9s-lab1
  namespace: clab-{{ pr_number }}
data:
  init.sh: |
    #!/bin/bash
    sleep 10
    FastCli -p 15 -c 'security pki key generate rsa 2048 eapi-key.key'
    FastCli -p 15 -c 'security pki certificate generate self-signed eapi-self-signed.crt key eapi-key.key validity 9000 parameters common-name r3-lab2-de.local'
    FastCli -p 15 -c 'conf t \n management api http-commands \n vrf OOB \n no shutdown'