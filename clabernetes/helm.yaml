apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clabernetes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'oci://ghcr.io/srl-labs/clabernetes/clabernetes'
    targetRevision: 0.3.3
    chart: clabernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: clabernetes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=false
    - RespectIgnoreDifferences=true
    - Validate=false
  # The clabernetes controller generates its CA/TLS/webhook certs at runtime and
  # writes them into this Secret; the chart ships it empty -> permanent OutOfSync
  # (and selfHeal would wipe the certs). Ignore its data.
  ignoreDifferences:
  - group: ""
    kind: Secret
    name: clabernetes-certificate
    jsonPointers:
    - /data
