apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: clabernetes-manager
    chart: clabernetes-0.3.3
    clabernetes/app: clabernetes
    clabernetes/component: manager
    clabernetes/name: clabernetes-manager
    heritage: Helm
    release: clabernetes
    revision: "1"
  name: clabernetes-manager
  namespace: clabernetes
spec:
  replicas: 3
  selector:
    matchLabels:
      clabernetes/app: clabernetes
      clabernetes/component: manager
      release: clabernetes
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clabernetes-manager
        chart: clabernetes-0.3.3
        clabernetes/app: clabernetes
        clabernetes/component: manager
        clabernetes/name: clabernetes-manager
        heritage: Helm
        release: clabernetes
        revision: "1"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  clabernetes/app: clabernetes
                  clabernetes/component: manager
                  clabernetes/name: clabernetes-manager
              topologyKey: kubernetes.io/hostname
            weight: 100
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  clabernetes/app: clabernetes
                  clabernetes/component: manager
                  clabernetes/name: clabernetes-manager
              topologyKey: topology.kubernetes.io/zone
            weight: 50
      containers:
      - command:
        - /clabernetes/manager
        - run
        env:
        - name: APP_NAME
          value: clabernetes
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLIENT_OPERATION_TIMEOUT_MULTIPLIER
          value: "1"
        - name: MANAGER_LOGGER_LEVEL
          value: info
        - name: CONTROLLER_LOGGER_LEVEL
          value: info
        - name: LAUNCHER_IMAGE
          value: ghcr.io/srl-labs/clabernetes/clabernetes-launcher:0.3.3
        image: ghcr.io/srl-labs/clabernetes/clabernetes-manager:0.3.3
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 2
          httpGet:
            path: /alive
            port: 10443
            scheme: HTTPS
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        name: manager
        ports:
        - containerPort: 10443
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
      initContainers:
      - command:
        - /clabernetes/manager
        - run
        - --initializer
        env:
        - name: APP_NAME
          value: clabernetes
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLIENT_OPERATION_TIMEOUT_MULTIPLIER
          value: "1"
        - name: MANAGER_LOGGER_LEVEL
          value: info
        - name: CONTROLLER_LOGGER_LEVEL
          value: info
        - name: LAUNCHER_IMAGE
          value: ghcr.io/srl-labs/clabernetes/clabernetes-launcher:0.3.3
        image: ghcr.io/srl-labs/clabernetes/clabernetes-manager:0.3.3
        imagePullPolicy: IfNotPresent
        name: init
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
      serviceAccountName: clabernetes-service-account
      terminationGracePeriodSeconds: 10
---
